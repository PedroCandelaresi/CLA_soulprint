<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Logo Ejemplo</title>
  <desc id="desc">Logo vectorial profesional para Ejemplo, con estetica industrial, metalurgica y ferretera.</desc>
  <defs>
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5F7FA"/>
      <stop offset="28%" stop-color="#D6DDE5"/>
      <stop offset="55%" stop-color="#A2ADB8"/>
      <stop offset="78%" stop-color="#7C8793"/>
      <stop offset="100%" stop-color="#E3E8EE"/>
    </linearGradient>
    <linearGradient id="graphite" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#31363C"/>
      <stop offset="100%" stop-color="#111418"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFB347"/>
      <stop offset="100%" stop-color="#E16A00"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0B0D10" flood-opacity="0.25"/>
    </filter>
    <clipPath id="gearClip">
      <circle cx="160" cy="160" r="84"/>
    </clipPath>
  </defs>
  <g filter="url(#shadow)">
    <g transform="translate(160 160)">
      <g fill="url(#accent)">
        <rect x="-12" y="-124" width="24" height="36" rx="6"/>
        <rect x="-12" y="88" width="24" height="36" rx="6"/>
        <rect x="88" y="-12" width="36" height="24" rx="6"/>
        <rect x="-124" y="-12" width="36" height="24" rx="6"/>
        <rect x="-12" y="-124" width="24" height="36" rx="6" transform="rotate(45)"/>
        <rect x="-12" y="88" width="24" height="36" rx="6" transform="rotate(45)"/>
        <rect x="-12" y="-124" width="24" height="36" rx="6" transform="rotate(90)"/>
        <rect x="-12" y="88" width="24" height="36" rx="6" transform="rotate(90)"/>
        <rect x="-12" y="-124" width="24" height="36" rx="6" transform="rotate(135)"/>
        <rect x="-12" y="88" width="24" height="36" rx="6" transform="rotate(135)"/>
      </g>
      <circle r="98" fill="url(#graphite)"/>
      <circle r="78" fill="white" fill-opacity="0.03" stroke="url(#accent)" stroke-width="6"/>
      <circle r="44" fill="#15191E" stroke="#7B8794" stroke-opacity="0.5" stroke-width="4"/>
    </g>
    <g clip-path="url(#gearClip)">
      <path d="M98 211C132 187 148 155 168 116C187 81 219 58 261 61" stroke="url(#steel)" stroke-width="22" stroke-linecap="round"/>
      <path d="M83 236C126 212 153 177 176 132C194 97 225 76 258 76" stroke="#CBD3DB" stroke-width="10" stroke-linecap="round" opacity="0.95"/>
      <path d="M91 131H249" stroke="#5B6570" stroke-width="4" stroke-dasharray="8 10" opacity="0.55"/>
    </g>
  </g>
  <g filter="url(#shadow)">
    <text x="300" y="203" font-family="Inter, Segoe UI, Roboto, Arial, sans-serif" font-size="132" font-weight="800" letter-spacing="2" fill="url(#steel)">EJEMPLO</text>
    <rect x="306" y="228" width="402" height="8" rx="4" fill="url(#accent)"/>
    <text x="309" y="267" font-family="Inter, Segoe UI, Roboto, Arial, sans-serif" font-size="28" font-weight="600" letter-spacing="6" fill="#6E7A86">INDUSTRIA · FERRETERIA · TEXTIL</text>
  </g>
</svg>
