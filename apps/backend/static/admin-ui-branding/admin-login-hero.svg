<svg width="1600" height="1000" viewBox="0 0 1600 1000" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="cla-hero-title cla-hero-desc">
  <title id="cla-hero-title">CLA Soulprint — Panel de administración</title>
  <desc id="cla-hero-desc">Hero con la paleta CLA (verde profundo, crema y dorado) para el login del panel administrativo.</desc>
  <defs>
    <linearGradient id="cla-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#022c18"/>
      <stop offset="55%" stop-color="#004825"/>
      <stop offset="100%" stop-color="#0b5a31"/>
    </linearGradient>
    <radialGradient id="cla-gold" cx="0.82" cy="0.22" r="0.7">
      <stop offset="0%" stop-color="#c7a46b" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#c7a46b" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#c7a46b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cla-cream" cx="0.1" cy="0.9" r="0.7">
      <stop offset="0%" stop-color="#f4ead5" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#f4ead5" stop-opacity="0"/>
    </radialGradient>
    <pattern id="cla-dots" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#f4ead5" fill-opacity="0.08"/>
    </pattern>
  </defs>

  <rect width="1600" height="1000" fill="url(#cla-bg)"/>
  <rect width="1600" height="1000" fill="url(#cla-dots)"/>
  <rect width="1600" height="1000" fill="url(#cla-gold)"/>
  <rect width="1600" height="1000" fill="url(#cla-cream)"/>

  <g opacity="0.18" stroke="#f4ead5" stroke-width="1" fill="none">
    <circle cx="1180" cy="260" r="260"/>
    <circle cx="1180" cy="260" r="340"/>
    <circle cx="1180" cy="260" r="420"/>
  </g>

  <g transform="translate(120 380)">
    <text font-family="Georgia, 'Times New Roman', serif" font-size="108" font-weight="500" fill="#f4ead5" letter-spacing="8">CLA Soulprint</text>
    <text y="70" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" fill="#c7a46b" letter-spacing="12" font-weight="300">PANEL DE ADMINISTRACIÓN</text>
    <line x1="0" y1="130" x2="220" y2="130" stroke="#c7a46b" stroke-width="2"/>
    <text y="200" font-family="Georgia, 'Times New Roman', serif" font-size="34" fill="#f9f5ed" font-style="italic" opacity="0.85">La impronta que da alma a cada pieza.</text>
  </g>

  <g transform="translate(1320 860)" opacity="0.75">
    <circle r="32" fill="none" stroke="#c7a46b" stroke-width="2"/>
    <circle r="14" fill="#c7a46b"/>
  </g>
</svg>
