services:
  mysql:
    image: mysql:8.4
    container_name: tienda_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:4406:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u${DB_USER} -p${DB_PASSWORD} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - tienda_net

  backend:
    build:
      context: ../../
      dockerfile: apps/backend/Dockerfile
    container_name: tienda_backend
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV}
      APP_ENV: ${APP_ENV}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      PORT: 3001
      SUPERADMIN_USERNAME: ${SUPERADMIN_USERNAME}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD}
      COOKIE_SECRET: ${COOKIE_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      COOKIE_SAME_SITE: ${COOKIE_SAME_SITE:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-}
      COOKIE_SECURE_PROXY: ${COOKIE_SECURE_PROXY:-}
      ASSET_URL_PREFIX: /assets/
      DB_SYNCHRONIZE: ${DB_SYNCHRONIZE}
      SHOP_PUBLIC_URL: ${SHOP_PUBLIC_URL:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_SECURE: ${SMTP_SECURE:-}
      # Getnet Payment Configuration
      GETNET_ENABLED: ${GETNET_ENABLED:-false}
      GETNET_PORT: 3002
      GETNET_AUTH_BASE_URL: ${GETNET_AUTH_BASE_URL:-}
      GETNET_CHECKOUT_BASE_URL: ${GETNET_CHECKOUT_BASE_URL:-}
      GETNET_CLIENT_ID: ${GETNET_CLIENT_ID:-}
      GETNET_CLIENT_SECRET: ${GETNET_CLIENT_SECRET:-}
      GETNET_SCOPE: ${GETNET_SCOPE:-*}
      GETNET_CURRENCY: ${GETNET_CURRENCY:-032}
      GETNET_WEBHOOK_URL: ${GETNET_WEBHOOK_URL:-}
      GETNET_SUCCESS_URL: ${GETNET_SUCCESS_URL:-}
      GETNET_FAILED_URL: ${GETNET_FAILED_URL:-}
      GETNET_EXPIRE_LIMIT_MINUTES: ${GETNET_EXPIRE_LIMIT_MINUTES:-10}
      GETNET_REQUEST_TIMEOUT: ${GETNET_REQUEST_TIMEOUT:-30000}
    ports:
      # Primary backend loopback upstream for the recommended host-level Nginx.
      - "127.0.0.1:4002:3001"
      # Direct/debug access to the Shop API. Not the primary public entrypoint.
      - "127.0.0.1:4001:3001"
    volumes:
      - vendure_assets:/usr/src/app/apps/backend/static/assets
    networks:
      - tienda_net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

  getnet:
    build:
      context: ../../
      dockerfile: apps/backend/Dockerfile
    container_name: tienda_getnet
    restart: always
    command: ["pnpm", "start:getnet:prod"]
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      APP_ENV: ${APP_ENV}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      GETNET_PORT: 4003
      GETNET_AUTH_BASE_URL: ${GETNET_AUTH_BASE_URL:-}
      GETNET_CHECKOUT_BASE_URL: ${GETNET_CHECKOUT_BASE_URL:-}
      GETNET_CLIENT_ID: ${GETNET_CLIENT_ID:-}
      GETNET_CLIENT_SECRET: ${GETNET_CLIENT_SECRET:-}
      GETNET_SCOPE: ${GETNET_SCOPE:-*}
      GETNET_CURRENCY: ${GETNET_CURRENCY:-032}
      GETNET_WEBHOOK_URL: ${GETNET_WEBHOOK_URL:-}
      GETNET_SUCCESS_URL: ${GETNET_SUCCESS_URL:-}
      GETNET_FAILED_URL: ${GETNET_FAILED_URL:-}
      GETNET_EXPIRE_LIMIT_MINUTES: ${GETNET_EXPIRE_LIMIT_MINUTES:-10}
      GETNET_REQUEST_TIMEOUT: ${GETNET_REQUEST_TIMEOUT:-30000}
    ports:
      # Getnet standalone server loopback upstream for host-level Nginx
      - "127.0.0.1:4003:4003"
    networks:
      - tienda_net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4003/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  storefront:
    build:
      context: ../../apps/storefront
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_VENDURE_API_URL: ${NEXT_PUBLIC_VENDURE_API_URL}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    container_name: tienda_storefront
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: 3000
      NEXT_PUBLIC_VENDURE_API_URL: ${NEXT_PUBLIC_VENDURE_API_URL}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      VENDURE_INTERNAL_API_URL: http://backend:3001/shop-api
      GETNET_INTERNAL_API_URL: http://getnet:4003/payments/getnet
    ports:
      # Loopback upstream for the recommended host-level Nginx root route.
      - "127.0.0.1:4000:3000"
    networks:
      - tienda_net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  mysql_data:
  vendure_assets:

networks:
  tienda_net:
    driver: bridge
