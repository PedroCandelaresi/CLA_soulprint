name: cla_soulprint

services:
  mysql:
    image: mysql:8.4
    container_name: cla_soulprint_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:3406:3306"
    volumes:
      - cla_soulprint_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u${DB_USER} -p${DB_PASSWORD} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - cla_soulprint_net

  backend:
    build:
      context: ../../
      dockerfile: apps/backend/Dockerfile
      args:
        ADMIN_TESTING_MODE: ${ADMIN_TESTING_MODE:-false}
        ENABLE_ADMIN_TESTING: ${ENABLE_ADMIN_TESTING:-false}
        TESTING_MODE: ${TESTING_MODE:-false}
    container_name: cla_soulprint_backend
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV}
      APP_ENV: ${APP_ENV}
      ADMIN_TESTING_MODE: ${ADMIN_TESTING_MODE:-false}
      ALLOW_PUBLIC_ADMIN_TESTING_MODE: ${ALLOW_PUBLIC_ADMIN_TESTING_MODE:-false}
      ENABLE_ADMIN_TESTING: ${ENABLE_ADMIN_TESTING:-false}
      TESTING_MODE: ${TESTING_MODE:-false}
      ADMIN_AUTO_LOGIN_TIMEOUT_MS: ${ADMIN_AUTO_LOGIN_TIMEOUT_MS:-15000}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      PORT: 3001
      SUPERADMIN_USERNAME: ${SUPERADMIN_USERNAME}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD}
      COOKIE_SECRET: ${COOKIE_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      COOKIE_SAME_SITE: ${COOKIE_SAME_SITE:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-}
      COOKIE_SECURE_PROXY: ${COOKIE_SECURE_PROXY:-}
      REQUIRE_CUSTOMER_VERIFICATION: ${REQUIRE_CUSTOMER_VERIFICATION:-}
      ASSET_URL_PREFIX: /assets/
      DB_SYNCHRONIZE: ${DB_SYNCHRONIZE}
      RECREATE_DB_ON_START: ${RECREATE_DB_ON_START:-}
      ALLOW_DESTRUCTIVE_SYNC: ${ALLOW_DESTRUCTIVE_SYNC:-}
      BOOTSTRAP_DEMO_DATA: ${BOOTSTRAP_DEMO_DATA:-}
      REINDEX_SEARCH_ON_START: ${REINDEX_SEARCH_ON_START:-false}
      RUN_JOB_QUEUE_IN_MAIN_PROCESS: ${RUN_JOB_QUEUE_IN_MAIN_PROCESS:-}
      SHOP_PUBLIC_URL: ${SHOP_PUBLIC_URL:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_SECURE: ${SMTP_SECURE:-}
      MERCADOPAGO_ACCESS_TOKEN: ${MERCADOPAGO_ACCESS_TOKEN:-}
      MERCADOPAGO_WEBHOOK_SECRET: ${MERCADOPAGO_WEBHOOK_SECRET:-}
      MERCADOPAGO_ENV: ${MERCADOPAGO_ENV:-testing}
      MERCADOPAGO_PUBLIC_BASE_URL: ${MERCADOPAGO_PUBLIC_BASE_URL:-}
      PERSONALIZATION_REQUIRE_UPLOAD_BY_DEFAULT: ${PERSONALIZATION_REQUIRE_UPLOAD_BY_DEFAULT:-true}
    ports:
      # Primary backend loopback upstream for the recommended host-level Nginx.
      - "127.0.0.1:3402:3001"
      # Direct/debug access to the Shop API. Not the primary public entrypoint.
      - "127.0.0.1:3401:3001"
    volumes:
      - cla_soulprint_vendure_assets:/usr/src/app/apps/backend/static/assets
    networks:
      - cla_soulprint_net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS --max-time 5 http://127.0.0.1:3001/health/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  storefront:
    build:
      context: ../../apps/storefront
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_VENDURE_API_URL: ${NEXT_PUBLIC_VENDURE_API_URL}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
        NEXT_PUBLIC_REQUIRE_CUSTOMER_VERIFICATION: ${REQUIRE_CUSTOMER_VERIFICATION}
    container_name: cla_soulprint_storefront
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: 3000
      NEXT_PUBLIC_VENDURE_API_URL: ${NEXT_PUBLIC_VENDURE_API_URL}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      NEXT_PUBLIC_REQUIRE_CUSTOMER_VERIFICATION: ${REQUIRE_CUSTOMER_VERIFICATION}
      VENDURE_INTERNAL_API_URL: http://backend:3001/shop-api
      STOREFRONT_UPSTREAM_TIMEOUT_MS: ${STOREFRONT_UPSTREAM_TIMEOUT_MS:-8000}
    ports:
      # Loopback and direct local access for the storefront.
      - "127.0.0.1:3400:3000"
    networks:
      - cla_soulprint_net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS --max-time 5 http://127.0.0.1:3000/api/health/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

volumes:
  cla_soulprint_mysql_data:
    name: cla_soulprint_mysql_data
  cla_soulprint_vendure_assets:
    name: cla_soulprint_vendure_assets

networks:
  cla_soulprint_net:
    name: cla_soulprint_net
    driver: bridge
