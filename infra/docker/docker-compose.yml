name: demo2

services:
  mysql:
    image: mysql:8.4
    container_name: demo2_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:3006:3306"
    volumes:
      - demo2_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u${DB_USER} -p${DB_PASSWORD} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - demo2_net

  backend:
    build:
      context: ../../
      dockerfile: apps/backend/Dockerfile
    container_name: demo2_backend
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV}
      APP_ENV: ${APP_ENV}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      PORT: 3001
      SUPERADMIN_USERNAME: ${SUPERADMIN_USERNAME}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD}
      COOKIE_SECRET: ${COOKIE_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      COOKIE_SAME_SITE: ${COOKIE_SAME_SITE:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-}
      COOKIE_SECURE_PROXY: ${COOKIE_SECURE_PROXY:-}
      REQUIRE_CUSTOMER_VERIFICATION: ${REQUIRE_CUSTOMER_VERIFICATION:-}
      ASSET_URL_PREFIX: /assets/
      DB_SYNCHRONIZE: ${DB_SYNCHRONIZE}
      BOOTSTRAP_DEMO_DATA: ${BOOTSTRAP_DEMO_DATA:-}
      RUN_JOB_QUEUE_IN_MAIN_PROCESS: ${RUN_JOB_QUEUE_IN_MAIN_PROCESS:-}
      SHOP_PUBLIC_URL: ${SHOP_PUBLIC_URL:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_SECURE: ${SMTP_SECURE:-}
      MERCADOPAGO_ACCESS_TOKEN: ${MERCADOPAGO_ACCESS_TOKEN:-}
      MERCADOPAGO_WEBHOOK_SECRET: ${MERCADOPAGO_WEBHOOK_SECRET:-}
      MERCADOPAGO_ENV: ${MERCADOPAGO_ENV:-testing}
      MERCADOPAGO_PUBLIC_BASE_URL: ${MERCADOPAGO_PUBLIC_BASE_URL:-}
    ports:
      # Primary backend loopback upstream for the recommended host-level Nginx.
      - "127.0.0.1:3002:3001"
      # Direct/debug access to the Shop API. Not the primary public entrypoint.
      - "127.0.0.1:3001:3001"
    volumes:
      - demo2_vendure_assets:/usr/src/app/apps/backend/static/assets
    networks:
      - demo2_net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

  storefront:
    build:
      context: ../../apps/storefront
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_VENDURE_API_URL: ${NEXT_PUBLIC_VENDURE_API_URL}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
        NEXT_PUBLIC_REQUIRE_CUSTOMER_VERIFICATION: ${REQUIRE_CUSTOMER_VERIFICATION}
    container_name: demo2_storefront
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: 3000
      NEXT_PUBLIC_VENDURE_API_URL: ${NEXT_PUBLIC_VENDURE_API_URL}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      NEXT_PUBLIC_REQUIRE_CUSTOMER_VERIFICATION: ${REQUIRE_CUSTOMER_VERIFICATION}
      VENDURE_INTERNAL_API_URL: http://backend:3001/shop-api
    ports:
      # Loopback and direct local access for the storefront.
      - "127.0.0.1:3000:3000"
    networks:
      - demo2_net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  demo2_mysql_data:
    name: demo2_mysql_data
  demo2_vendure_assets:
    name: demo2_vendure_assets

networks:
  demo2_net:
    name: demo2_net
    driver: bridge
