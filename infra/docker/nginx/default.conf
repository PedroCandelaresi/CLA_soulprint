# Reference only: this file describes a containerized Nginx attached to the Docker network.
# The primary operational model for this repository is host-level Nginx using
# infra/docker/nginx/demo.example.com.conf.example as the main template.
limit_req_zone $binary_remote_addr zone=storefront_shop_api:10m rate=30r/m;

server {
    listen 80;
    server_name localhost;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    location = /api/shop {
        limit_req zone=storefront_shop_api burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://storefront:3000/api/shop;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/shop/ {
        limit_req zone=storefront_shop_api burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://storefront:3000/api/shop/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /payments/mercadopago/webhook {
        proxy_pass http://backend:3001/payments/mercadopago/webhook$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://storefront:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /admin {
        return 301 /admin/;
    }

    location /admin/ {
        proxy_pass http://backend:3001/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /shop-api {
        return 404;
    }

    location /shop-api/ {
        return 404;
    }

    location /admin-api {
        proxy_pass http://backend:3001/admin-api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /assets {
        return 301 /assets/;
    }

    location /assets/ {
        proxy_pass http://backend:3001/assets/;
        proxy_set_header Host $host;
    }
}
