# Reverse proxy for demo2.nqn.net.ar
# Host-level Nginx on the VPS proxying to Docker Compose loopback ports.
# After obtaining a TLS certificate (e.g. certbot --nginx -d demo2.nqn.net.ar),
# certbot will add the SSL block automatically. The HTTP→HTTPS redirect below
# is the recommended starting point.
limit_req_zone $binary_remote_addr zone=storefront_shop_api:10m rate=30r/m;

server {
    listen 80;
    server_name demo2.nqn.net.ar;

    # Redirect all HTTP traffic to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name demo2.nqn.net.ar;

    # TLS certificates — managed by Certbot (fill in after running certbot)
    # ssl_certificate     /etc/letsencrypt/live/demo2.nqn.net.ar/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/demo2.nqn.net.ar/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50M;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    location = /api/shop {
        limit_req zone=storefront_shop_api burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:3000/api/shop;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/shop/ {
        limit_req zone=storefront_shop_api burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:3000/api/shop/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /payments/mercadopago/webhook {
        proxy_pass http://127.0.0.1:3002/payments/mercadopago/webhook$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Storefront (Next.js)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Vendure Shop API (GraphQL)
    location = /shop-api {
        return 404;
    }

    location /shop-api/ {
        return 404;
    }

    # Vendure Admin UI
    location = /admin {
        return 301 /admin/;
    }

    location /admin/ {
        proxy_pass http://127.0.0.1:3002/admin/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Vendure Admin API
    location = /admin-api {
        proxy_pass http://127.0.0.1:3002/admin-api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin-api/ {
        proxy_pass http://127.0.0.1:3002/admin-api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Vendure Assets (product images, uploads)
    location = /assets {
        return 301 /assets/;
    }

    location /assets/ {
        proxy_pass http://127.0.0.1:3002/assets/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
