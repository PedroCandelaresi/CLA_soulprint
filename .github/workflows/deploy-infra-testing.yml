name: Deploy Docker Stack Testing

on:
  push:
    branches: [develop]
    paths:
      - 'infra/docker/docker-compose.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'

concurrency:
  group: deploy-testing
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, linux, testing]

    steps:

      - name: Update repository
        run: |
          set -euo pipefail
          REPO_PATH="$(realpath /opt/cla_soulprint-testing)"
          git config --system --add safe.directory "$REPO_PATH"
          cd "$REPO_PATH"
          git fetch origin
          git checkout develop
          git reset --hard origin/develop

      - name: Install dependencies
        run: |
          set -euo pipefail
          cd /opt/cla_soulprint-testing
          pnpm install --frozen-lockfile

      - name: Preflight deploy environment
        run: |
          set -euo pipefail
          cd /opt/cla_soulprint-testing
          if [ ! -f infra/docker/.env ]; then
            echo "Missing required deploy environment file: infra/docker/.env" >&2
            exit 1
          fi

      - name: Validate workspace
        run: |
          set -euo pipefail
          cd /opt/cla_soulprint-testing
          pnpm validate

      - name: Validate Compose config
        run: |
          set -euo pipefail
          cd /opt/cla_soulprint-testing
          docker compose --env-file infra/docker/.env -f infra/docker/docker-compose.yml config

      - name: Deploy testing Docker stack
        run: |
          set -euo pipefail
          cd /opt/cla_soulprint-testing
          docker compose --env-file infra/docker/.env -f infra/docker/docker-compose.yml up -d --build mysql backend storefront

      - name: Smoke test testing stack
        run: |
          set -euo pipefail
          for i in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:4002/health > /dev/null && curl -fsSI http://127.0.0.1:4000 > /dev/null; then
              exit 0
            fi
            sleep 3
          done
          echo "Testing stack smoke tests failed after docker stack deploy" >&2
          exit 1

      - name: Show status
        run: |
          set -euo pipefail
          cd /opt/cla_soulprint-testing
          docker compose --env-file infra/docker/.env -f infra/docker/docker-compose.yml ps
