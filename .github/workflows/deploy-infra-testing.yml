name: Deploy Infra Testing

on:
  push:
    branches: [develop]
    paths:
      - 'infra/docker/**'

concurrency:
  group: deploy-infra-testing
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, linux, testing]

    steps:
      - name: Update repository
        run: |
          cd /opt/cla_soulprint-testing
          git fetch origin
          git checkout develop
          git reset --hard origin/develop

      - name: Ensure mysql is up
        run: |
          cd /opt/cla_soulprint-testing
          docker compose -f infra/docker/docker-compose.yml up -d mysql

      - name: Show status
        run: |
          cd /opt/cla_soulprint-testing
          docker compose -f infra/docker/docker-compose.yml ps