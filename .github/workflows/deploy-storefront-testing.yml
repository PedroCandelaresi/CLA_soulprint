name: Deploy Storefront Testing

on:
  push:
    branches: [develop]
    paths:
      - 'apps/storefront/**'
      - 'apps/storefront/Dockerfile'

concurrency:
  group: deploy-testing
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, linux, testing]

    steps:

      - name: Update repository
        run: |
          set -euo pipefail
          REPO_PATH="$(realpath /opt/cla_soulprint-testing)"
          git config --system --add safe.directory "$REPO_PATH"
          cd "$REPO_PATH"
          git fetch origin
          git checkout develop
          git reset --hard origin/develop

      - name: Install dependencies
        run: |
          set -euo pipefail
          cd /opt/cla_soulprint-testing
          pnpm install --frozen-lockfile

      - name: Preflight deploy environment
        run: |
          set -euo pipefail
          cd /opt/cla_soulprint-testing
          if [ ! -f infra/docker/.env ]; then
            echo "Missing required deploy environment file: infra/docker/.env" >&2
            exit 1
          fi

      - name: Lint storefront
        run: |
          set -euo pipefail
          cd /opt/cla_soulprint-testing
          pnpm --dir apps/storefront lint

      - name: Build storefront app
        run: |
          set -euo pipefail
          cd /opt/cla_soulprint-testing
          pnpm --dir apps/storefront build

      - name: Validate Compose config
        run: |
          set -euo pipefail
          cd /opt/cla_soulprint-testing
          docker compose --env-file infra/docker/.env -f infra/docker/docker-compose.yml config

      - name: Build storefront
        run: |
          set -euo pipefail
          cd /opt/cla_soulprint-testing
          docker compose --env-file infra/docker/.env -f infra/docker/docker-compose.yml build storefront

      - name: Restart storefront
        run: |
          set -euo pipefail
          cd /opt/cla_soulprint-testing
          docker compose --env-file infra/docker/.env -f infra/docker/docker-compose.yml up -d storefront

      - name: Smoke test storefront
        run: |
          set -euo pipefail
          for i in $(seq 1 20); do
            if curl -fsSI http://127.0.0.1:4000 > /dev/null; then
              exit 0
            fi
            sleep 3
          done
          echo "Storefront smoke test failed after deploy" >&2
          exit 1

      - name: Show status
        run: |
          set -euo pipefail
          cd /opt/cla_soulprint-testing
          docker compose --env-file infra/docker/.env -f infra/docker/docker-compose.yml ps
