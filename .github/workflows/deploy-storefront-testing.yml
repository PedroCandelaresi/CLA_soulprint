name: Deploy Storefront Testing

on:
  push:
    branches: [develop]
    paths:
      - 'apps/storefront/**'
      - 'infra/docker/docker-compose.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'

concurrency:
  group: deploy-storefront-testing
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, linux, testing]

    steps:

      - name: Update repository
        run: |
          set -euo pipefail
          REPO_PATH="$(realpath /opt/cla_soulprint-testing)"
          git config --system --add safe.directory "$REPO_PATH"
          cd "$REPO_PATH"
          git fetch origin
          git checkout develop
          git reset --hard origin/develop

      - name: Install dependencies
        run: |
          set -euo pipefail
          cd /opt/cla_soulprint-testing
          pnpm install --frozen-lockfile

      - name: Validate workspace
        run: |
          set -euo pipefail
          cd /opt/cla_soulprint-testing
          pnpm validate

      - name: Validate Compose config
        run: |
          set -euo pipefail
          cd /opt/cla_soulprint-testing
          pnpm compose:config

      - name: Build storefront
        run: |
          set -euo pipefail
          cd /opt/cla_soulprint-testing
          docker compose -f infra/docker/docker-compose.yml build storefront

      - name: Restart storefront
        run: |
          set -euo pipefail
          cd /opt/cla_soulprint-testing
          docker compose -f infra/docker/docker-compose.yml up -d storefront

      - name: Smoke test storefront
        run: |
          set -euo pipefail
          for i in $(seq 1 20); do
            if curl -fsSI http://127.0.0.1:4000 > /dev/null; then
              exit 0
            fi
            sleep 3
          done
          echo "Storefront smoke test failed after deploy" >&2
          exit 1

      - name: Show status
        run: |
          set -euo pipefail
          cd /opt/cla_soulprint-testing
          docker compose -f infra/docker/docker-compose.yml ps
