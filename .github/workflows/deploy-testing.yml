name: Deploy Testing

on:
  push:
    branches:
      - develop

concurrency:
  group: deploy-testing
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, linux, testing]
    env:
      REPO_PATH: /opt/cla_soulprint-testing
      COMPOSE_FILE: infra/docker/docker-compose.yml
      ENV_FILE: infra/docker/.env
      BEFORE_SHA: ${{ github.event.before }}
      DOCKER_BUILDKIT: "1"
      COMPOSE_DOCKER_CLI_BUILD: "1"

    steps:
      - name: Sync testing checkout to pushed SHA
        run: |
          set -euo pipefail
          REPO_PATH="$(realpath "$REPO_PATH")"
          if [ ! -d "$REPO_PATH/.git" ]; then
            echo "Missing persistent git checkout at $REPO_PATH" >&2
            exit 1
          fi
          git config --system --add safe.directory "$REPO_PATH"
          cd "$REPO_PATH"
          git fetch --prune --tags origin
          git checkout -B develop origin/develop
          git reset --hard "$GITHUB_SHA"
          git clean -ffd

      - name: Detect deploy scope
        id: detect
        run: |
          set -euo pipefail
          cd "$REPO_PATH"

          before="$BEFORE_SHA"
          after="$GITHUB_SHA"
          scope="none"
          reason="Only docs, manual Nginx references, or CI-only files changed."
          diff_source="push-range"
          changed_files=()

          if [ -z "$before" ] || [[ "$before" =~ ^0+$ ]] || ! git cat-file -e "$before^{commit}" 2>/dev/null; then
            scope="stack"
            reason="Previous pushed SHA is unavailable in the VPS checkout; running a conservative stack/global deploy."
            diff_source="fallback"
            mapfile -t changed_files < <(git show --pretty='' --name-only "$after" | sed '/^$/d')
          else
            mapfile -t changed_files < <(git diff --name-only "$before" "$after" | sed '/^$/d')
            backend=false
            storefront=false
            global=false

            for path in "${changed_files[@]}"; do
              case "$path" in
                *.md|*.gitignore|*.env.example|infra/docker/nginx/*|.github/*)
                  ;;
                apps/backend/*)
                  backend=true
                  ;;
                apps/storefront/*)
                  storefront=true
                  ;;
                infra/docker/docker-compose.yml|package.json|pnpm-lock.yaml|pnpm-workspace.yaml|turbo.json)
                  global=true
                  ;;
                *)
                  global=true
                  ;;
              esac
            done

            if $global || { $backend && $storefront; }; then
              scope="stack"
              reason="Global runtime files changed, or backend and storefront changed together."
            elif $backend; then
              scope="backend"
              reason="Only backend runtime files changed."
            elif $storefront; then
              scope="storefront"
              reason="Only storefront runtime files changed."
            else
              scope="none"
              reason="Only docs, manual Nginx references, or CI-only files changed."
            fi
          fi

          if [ "${#changed_files[@]}" -eq 0 ]; then
            scope="none"
            reason="Push did not produce any file changes against the previous SHA."
          fi

          {
            echo "scope=$scope"
            echo "reason=$reason"
            echo "diff_source=$diff_source"
            echo "changed_files<<EOF"
            if [ "${#changed_files[@]}" -eq 0 ]; then
              echo "(none)"
            else
              printf '%s\n' "${changed_files[@]}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          {
            echo "### Deploy scope"
            echo "- Scope: \`$scope\`"
            echo "- Reason: $reason"
            echo "- Diff source: \`$diff_source\`"
            echo "- Event SHA: \`$after\`"
            echo "- Previous SHA: \`$before\`"
            echo
            echo "### Changed files"
            if [ "${#changed_files[@]}" -eq 0 ]; then
              echo "- (none)"
            else
              printf -- '- `%s`\n' "${changed_files[@]}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Skip deploy when no runtime changes are detected
        if: steps.detect.outputs.scope == 'none'
        run: |
          set -euo pipefail
          echo "${{ steps.detect.outputs.reason }}"

      - name: Preflight deploy environment
        if: steps.detect.outputs.scope != 'none'
        run: |
          set -euo pipefail
          cd "$REPO_PATH"
          if [ ! -f "$ENV_FILE" ]; then
            echo "Missing required deploy environment file: $ENV_FILE" >&2
            exit 1
          fi

      - name: Validate Compose config
        if: steps.detect.outputs.scope != 'none'
        run: |
          set -euo pipefail
          cd "$REPO_PATH"
          docker compose --env-file "$ENV_FILE" -f "$COMPOSE_FILE" config

      - name: Build and deploy backend
        if: steps.detect.outputs.scope == 'backend'
        run: |
          set -euo pipefail
          cd "$REPO_PATH"
          docker compose --env-file "$ENV_FILE" -f "$COMPOSE_FILE" up -d mysql
          docker compose --env-file "$ENV_FILE" -f "$COMPOSE_FILE" build backend
          docker compose --env-file "$ENV_FILE" -f "$COMPOSE_FILE" up -d backend

      - name: Build and deploy storefront
        if: steps.detect.outputs.scope == 'storefront'
        run: |
          set -euo pipefail
          cd "$REPO_PATH"
          docker compose --env-file "$ENV_FILE" -f "$COMPOSE_FILE" build storefront
          docker compose --env-file "$ENV_FILE" -f "$COMPOSE_FILE" up -d storefront

      - name: Build and deploy stack
        if: steps.detect.outputs.scope == 'stack'
        run: |
          set -euo pipefail
          cd "$REPO_PATH"
          docker compose --env-file "$ENV_FILE" -f "$COMPOSE_FILE" up -d mysql
          docker compose --env-file "$ENV_FILE" -f "$COMPOSE_FILE" build backend storefront
          docker compose --env-file "$ENV_FILE" -f "$COMPOSE_FILE" up -d backend storefront

      - name: Smoke test backend
        if: steps.detect.outputs.scope == 'backend'
        run: |
          set -euo pipefail
          wait_for_health() {
            local container="$1"
            local attempts="${2:-60}"
            for _ in $(seq 1 "$attempts"); do
              status="$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$container" 2>/dev/null || true)"
              case "$status" in
                healthy) return 0 ;;
                unhealthy|exited|dead) docker logs "$container" --tail 200 || true; return 1 ;;
              esac
              sleep 2
            done
            docker logs "$container" --tail 200 || true
            return 1
          }

          wait_for_http() {
            local url="$1"
            local attempts="${2:-20}"
            for _ in $(seq 1 "$attempts"); do
              if curl -fsS "$url" > /dev/null; then
                return 0
              fi
              sleep 2
            done
            return 1
          }

          wait_for_health cla_soulprint_backend 60
          wait_for_http http://127.0.0.1:3402/health 20

      - name: Smoke test storefront
        if: steps.detect.outputs.scope == 'storefront'
        run: |
          set -euo pipefail
          wait_for_health() {
            local container="$1"
            local attempts="${2:-90}"
            for _ in $(seq 1 "$attempts"); do
              status="$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$container" 2>/dev/null || true)"
              case "$status" in
                healthy) return 0 ;;
                unhealthy|exited|dead) docker logs "$container" --tail 200 || true; return 1 ;;
              esac
              sleep 2
            done
            docker logs "$container" --tail 200 || true
            return 1
          }

          wait_for_http() {
            local url="$1"
            local attempts="${2:-30}"
            for _ in $(seq 1 "$attempts"); do
              if curl -fsSI "$url" > /dev/null; then
                return 0
              fi
              sleep 2
            done
            return 1
          }

          wait_for_health cla_soulprint_storefront 90
          wait_for_http http://127.0.0.1:3400 30

      - name: Smoke test stack
        if: steps.detect.outputs.scope == 'stack'
        run: |
          set -euo pipefail
          wait_for_health() {
            local container="$1"
            local attempts="${2:-90}"
            for _ in $(seq 1 "$attempts"); do
              status="$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$container" 2>/dev/null || true)"
              case "$status" in
                healthy) return 0 ;;
                unhealthy|exited|dead) docker logs "$container" --tail 200 || true; return 1 ;;
              esac
              sleep 2
            done
            docker logs "$container" --tail 200 || true
            return 1
          }

          wait_for_http() {
            local url="$1"
            local attempts="${2:-30}"
            local curl_args="${3:-}"
            for _ in $(seq 1 "$attempts"); do
              if curl -fsS $curl_args "$url" > /dev/null; then
                return 0
              fi
              sleep 2
            done
            return 1
          }

          wait_for_health cla_soulprint_backend 60
          wait_for_health cla_soulprint_storefront 90
          wait_for_http http://127.0.0.1:3402/health 20
          wait_for_http http://127.0.0.1:3400 30 -I

      - name: Show Docker status
        if: always() && steps.detect.outputs.scope != 'none'
        run: |
          set -euo pipefail
          cd "$REPO_PATH"
          docker compose --env-file "$ENV_FILE" -f "$COMPOSE_FILE" ps
